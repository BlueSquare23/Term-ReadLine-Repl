name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Perl ${{ matrix.perl }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os:  [ ubuntu-latest ]
        perl: [ '5.32', '5.36', '5.38' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - name: Install cpanm
        run: cpanm --notest App::cpanminus

      - name: Install dependencies
        run: cpanm --notest --installdeps .

      - name: Build
        run: |
          perl Build.PL
          ./Build

      - name: Run tests
        run: ./Build test
